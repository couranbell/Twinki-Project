<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Nastusya Book News</title>
    <meta name="description" content="A static export of Nastusya Book News from WordPress.">
    <link rel="stylesheet" href="test1.css">
  </head>
  <body>
    <header class="site-header">
      <a class="site-title" href="#top" aria-label="Nastusya Book News home">
        <img class="site-logo" src="Images/BookRat.png" alt="">
        <span>Nastusya Book News</span>
      </a>
      <nav class="site-nav" aria-label="Primary navigation">
        <a href="#posts">Main</a>
        <a href="#gallery">Blog</a>
        <a href="#about">Contacts</a>
      </nav>
    </header>

    <main id="top">
      <section id="posts" class="hero" aria-labelledby="home-title">
        <div class="hero-copy">
          <p class="eyebrow">For Book-o-holics</p>
          <h1 id="home-title">Nastusya Book News</h1>
          <p>
            Notes, images, and small literary sparks from the original WordPress
            site, collected into one simple static page for GitHub Pages.
          </p>
        </div>
        <div class="hero-image-wrap">
          <img
            class="hero-image"
            src="https://literarytalkscom.wordpress.com/wp-content/uploads/2026/05/media_20240827_212332_2763506356372377508.jpg"
            alt="Uploaded image from Nastusya Book News"
          >
        </div>
      </section>

      <section id="gallery" class="section"></section>

      <section id="about" class="section about-section"></section>
    </main>

    <footer class="site-footer">
      <p>Static export from literarytalkscom.wordpress.com.</p>
      <a href="#top">Back to top</a>
    </footer>
  </body>
</html>
